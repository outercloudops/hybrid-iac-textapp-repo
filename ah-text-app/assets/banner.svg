<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-label="Thirteen-star colonial American flag">
  <title>Thirteen-Star Flag, 1777–1795</title>

  <!-- 13 alternating stripes: red base, white overlays -->
  <rect width="80" height="80" fill="#B22234"/>
  <rect y="6.15"  width="80" height="6.15" fill="#FFFFFF"/>
  <rect y="18.46" width="80" height="6.15" fill="#FFFFFF"/>
  <rect y="30.77" width="80" height="6.15" fill="#FFFFFF"/>
  <rect y="43.08" width="80" height="6.15" fill="#FFFFFF"/>
  <rect y="55.38" width="80" height="6.15" fill="#FFFFFF"/>
  <rect y="67.69" width="80" height="6.15" fill="#FFFFFF"/>

  <!-- Blue canton covering top 7 stripes -->
  <rect width="32" height="43.08" fill="#3C3B6E"/>

  <!-- 13 stars in Betsy Ross circular arrangement -->
  <defs>
    <polygon id="star"
      points="0,-2.5 0.588,-0.809 2.378,-0.772 0.951,0.309 1.469,2.024 0,1 -1.469,2.024 -0.951,0.309 -2.378,-0.772 -0.588,-0.809"
      fill="#FFFFFF"/>
  </defs>

  <use href="#star" transform="translate(16,11)"/>
  <use href="#star" transform="translate(20.64,12.14)"/>
  <use href="#star" transform="translate(24.23,15.32)"/>
  <use href="#star" transform="translate(25.93,19.80)"/>
  <use href="#star" transform="translate(25.35,24.56)"/>
  <use href="#star" transform="translate(22.63,28.49)"/>
  <use href="#star" transform="translate(18.39,30.71)"/>
  <use href="#star" transform="translate(13.61,30.71)"/>
  <use href="#star" transform="translate(9.37,28.49)"/>
  <use href="#star" transform="translate(6.65,24.56)"/>
  <use href="#star" transform="translate(6.07,19.80)"/>
  <use href="#star" transform="translate(7.77,15.32)"/>
  <use href="#star" transform="translate(11.36,12.14)"/>
</svg>
